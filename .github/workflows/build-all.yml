name: Build

on:
  push:
    branches: [ main, gh-actions ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Septum
        uses: actions/checkout@v6
        with:
          path: septum

      - name: Setup Alire
        uses: alire-project/setup-alire@v4
        with:
          version: 2.1.0

      - name: Build project
        working-directory: septum
        run: alr build --release

      - name: Unit Tests
        working-directory: septum/tests/
        run: |
          alr --no-tty build
